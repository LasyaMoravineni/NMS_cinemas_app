<nav class="navbar navbar-dark bg-dark px-4 shadow-sm">

  <!-- LEFT: Logo -->
  <div class="logo" (click)="goHome()">
    🎬 NMS Cinemas
  </div>

  <!-- CENTER: Search -->
  <div class="search-wrapper">
    <input
      type="text"
      class="form-control search-input"
      placeholder="Search movies..."
      [(ngModel)]="searchText"
      (keyup.enter)="search()"
    />
  </div>

  <!-- RIGHT: Auth Section -->
  <div class="auth-section d-flex align-items-center gap-3">

    <!-- If NOT logged in -->
    <ng-container *ngIf="!auth.isLoggedIn(); else loggedInBlock">

      <button
        class="btn btn-outline-light"
        (click)="goToLogin()">
        Sign In
      </button>

      <button
        class="btn btn-danger"
        (click)="goToRegister()">
        Register
      </button>

    </ng-container>

    <!-- If Logged in -->
    <ng-template #loggedInBlock>
      
      <span class="text-light">
        Hi, {{ auth.getUser()?.name }}
      </span>

      <button
        *ngIf="auth.isLoggedIn()"
        class="btn btn-outline-light me-2"
        (click)="goToBookings()">
        My Bookings
      </button>

      <button
        class="btn btn-danger"
        (click)="logout()">
        Logout
      </button>
    </ng-template>

  </div>
</nav>
