<div class="container mt-5">
  <div class="card p-4 shadow-lg col-md-4 mx-auto">

    <h3 class="mb-4 text-center">User Login</h3>

    <input 
      class="form-control mb-3"
      placeholder="Email"
      [(ngModel)]="email"
    />

    <input 
      type="password"
      class="form-control mb-3"
      placeholder="Password"
      [(ngModel)]="password"
    />

    <button 
      class="btn btn-danger w-100"
      (click)="login()"
    >
      Login
    </button>

    <p class="text-danger mt-3 text-center">{{ error }}</p>
  </div>
</div>
