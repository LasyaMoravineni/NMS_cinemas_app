<div class="container mt-4">

  <h3 class="mb-4" style="color:white">Manage Theatres</h3>

  <!-- Add / Edit Form -->
  <div class="card bg-dark text-light p-4 mb-4 shadow-sm">

    <h5 class="mb-3">{{ editing ? 'Edit Theatre' : 'Add Theatre' }}</h5>

    <div class="row g-3">

      <div class="col-md-6">
        <input class="form-control"
               placeholder="Theatre Name"
               [(ngModel)]="theatre.name">
      </div>

      <div class="col-md-6">
        <input class="form-control"
               placeholder="Location"
               [(ngModel)]="theatre.location">
      </div>

      <div class="col-md-12">
        <button class="btn btn-danger me-2"
                (click)="saveTheatre()">
          {{ editing ? 'Update Theatre' : 'Add Theatre' }}
        </button>

        <button *ngIf="editing"
                class="btn btn-secondary"
                (click)="cancelEdit()">
          Cancel
        </button>
      </div>

    </div>
  </div>

  <!-- Theatre Cards -->
  <div class="row">

    <div class="col-md-4 mb-4"
         *ngFor="let t of theatres; trackBy: trackByTheatre">

      <div class="card bg-dark text-light h-100 shadow-sm p-3">

        <h5>{{ t.name }}</h5>
        <p >{{ t.location }}</p>

        <div class="mt-3 d-flex justify-content-between">
          <button class="btn btn-sm btn-outline-danger"
                  (click)="editTheatre(t)">
            Edit
          </button>

          <button class="btn btn-sm btn-outline-danger"
                  (click)="deleteTheatre(t.theatreId)">
            Delete
          </button>
        </div>

      </div>

    </div>

  </div>

</div>
