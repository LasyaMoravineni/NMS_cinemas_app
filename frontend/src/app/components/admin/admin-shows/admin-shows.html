<div class="container mt-4">

  <h3 class="mb-4" style="color:white">Manage Shows</h3>

  <!-- Add / Edit Form -->
  <div class="card bg-dark text-light p-4 mb-4 shadow-sm">

    <h5 class="mb-3">{{ editing ? 'Edit Show' : 'Add Show' }}</h5>

    <div class="row g-3">

      <div class="col-md-6">
        <select class="form-select"
                [(ngModel)]="show.movieId">
          <option value="">Select Movie</option>
          <option *ngFor="let m of movies"
                  [value]="m.movieId">
            {{ m.title }}
          </option>
        </select>
      </div>

      <div class="col-md-6">
        <select class="form-select"
                [(ngModel)]="show.theatreId">
          <option value="">Select Theatre</option>
          <option *ngFor="let t of theatres"
                  [value]="t.theatreId">
            {{ t.name }}
          </option>
        </select>
      </div>

      <div class="col-md-4">
        <input type="datetime-local"
               class="form-control"
               [(ngModel)]="show.showTime">
      </div>

      <div class="col-md-4">
        <input type="number"
               class="form-control"
               placeholder="Price"
               [(ngModel)]="show.price">
      </div>

      <div class="col-md-4">
        <input type="number"
               class="form-control"
               placeholder="Available Seats"
               [(ngModel)]="show.availableSeats">
      </div>

      <div class="col-md-12">
        <button class="btn btn-danger me-2"
                (click)="saveShow()">
          {{ editing ? 'Update Show' : 'Add Show' }}
        </button>

        <button *ngIf="editing"
                class="btn btn-secondary"
                (click)="cancelEdit()">
          Cancel
        </button>
      </div>

    </div>
  </div>

  <!-- Show List -->
  <div class="row">

    <div class="col-md-4 mb-4"
         *ngFor="let s of shows; trackBy: trackByShow">

      <div class="card bg-dark text-light p-3 shadow-sm h-100">

        <h5>{{ s.movie?.title }}</h5>
        <p >{{ s.theatre?.name }}</p>
        <p>{{ s.showTime | date:'medium' }}</p>
        <p>₹ {{ s.price }}</p>
        <p>Seats: {{ s.availableSeats }}</p>

        <div class="mt-3 d-flex justify-content-between">
          <button class="btn btn-sm btn-outline-danger"
                  (click)="editShow(s)">
            Edit
          </button>

          <button class="btn btn-sm btn-outline-danger"
                  (click)="deleteShow(s.showId)">
            Delete
          </button>
        </div>

      </div>

    </div>

  </div>

</div>
