<div class="container mt-4">

  <div class="row g-3 align-items-end">

    <!-- SEARCH -->
    <div class="col-md-3">
      <label class="form-label">Title</label>
      <input
        class="form-control"
        [(ngModel)]="searchText"
        (input)="applyFilters()"
        placeholder="Search by title"
      />
    </div>

    <!-- GENRE -->
    <div class="col-md-2">
      <label class="form-label">Genre</label>
      <select
        class="form-select"
        [(ngModel)]="selectedGenre"
        (change)="applyFilters()"
      >
        <option value="">All</option>
        <option value="Action">Action</option>
        <option value="Sci-Fi">Sci-Fi</option>
        <option value="Comedy">Comedy</option>
        <option value="Drama">Drama</option>
      </select>
    </div>

    <!-- LANGUAGE -->
    <div class="col-md-2">
      <label class="form-label">Language</label>
      <select
        class="form-select"
        [(ngModel)]="selectedLanguage"
        (change)="applyFilters()"
      >
        <option value="">All</option>
        <option value="English">English</option>
        <option value="Hindi">Hindi</option>
        <option value="Telugu">Telugu</option>
      </select>
    </div>

    <!-- UPCOMING TOGGLE -->
    <div class="col-md-2">
      <button
        type="button"
        class="btn btn-outline-warning w-100"
        (click)="toggleUpcoming()"
      >
        {{ showUpcoming ? 'Show All' : 'Upcoming' }}
      </button>
    </div>

    <!-- RESET -->
    <div class="col-md-2">
      <button
        type="button"
        class="btn btn-secondary w-100"
        (click)="resetFilters()"
      >
        Reset
      </button>
    </div>

  </div>
</div>

<!-- Movies container -->
<div class="container mt-4">
  <h2 class="mb-4">Now Showing</h2>

  <div class="row">
    <div 
      class="col-md-3 mb-4" 
      *ngFor="let movie of movies"
      (click)="viewMovie(movie.movieId)"
      style="cursor: pointer;"
    >
      <div class="card h-100 shadow-sm">
        <img 
          [src]="movie.posterUrl || 'https://via.placeholder.com/300x400?text=No+Poster'" 
          class="card-img-top"
          style="height:400px; object-fit: cover;"
        >

        <div class="card-body">
          <h5 class="card-title">{{ movie.title }}</h5>
          <p class="card-text text-muted">
            {{ movie.genre }} | {{ movie.language }}
          </p>
          <p>{{ movie.duration }} mins</p>
          <span *ngIf="movie.isUpcoming"
                class="badge bg-warning text-dark mb-2">
            Upcoming
          </span>

        </div>
      </div>
    </div>
  </div>

  <!-- No results message -->
  <div *ngIf="movies.length === 0" class="text-center mt-4 text-muted">
    No movies found.
  </div>

</div>
