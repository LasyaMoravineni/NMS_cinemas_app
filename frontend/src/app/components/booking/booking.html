<div class="container mt-4">

  <div class="card p-4 shadow-lg">

    <h3 class="mb-3 text-center">
      {{ show?.movie?.title }} - {{ show?.theatre?.name }}
    </h3>

    <p class="text-center text-muted">
      {{ show?.showTime | date:'medium' }}
    </p>

    <div class="screen text-center mb-4">
       SCREEN THIS WAY
    </div>

    <!-- SEAT GRID -->
    <div *ngIf="seatLayout && seatLayout.length > 0" class="seat-grid">

      <div *ngFor="let row of seatLayout" class="seat-row">

          <!-- LEFT (2 seats) -->
          <div class="seat-group left">
            <button
              *ngFor="let seat of row.slice(0,2)"
              class="seat"
              [class.selected]="selectedSeats.includes(seat)"
              [class.booked]="bookedSeats.includes(seat)"
              (click)="toggleSeat(seat)"
            >
              {{ seat }}
            </button>
          </div>

          <!-- CENTRE(6 SEATS) -->
          <div class="seat-group center">
          <button
            *ngFor="let seat of row.slice(2,13)"
            class="seat"
            [class.selected]="selectedSeats.includes(seat)"
            [class.booked]="bookedSeats.includes(seat)"
            (click)="toggleSeat(seat)"
          >
            {{ seat }}
          </button>
          </div>

          <!-- CENTRE(6 SEATS) -->
          <div class="seat-group right">
          <button
            *ngFor="let seat of row.slice(13,15)"
            class="seat"
            [class.selected]="selectedSeats.includes(seat)"
            [class.booked]="bookedSeats.includes(seat)"
            (click)="toggleSeat(seat)"
          >
            {{ seat }}
          </button>
          </div>


      </div>

    </div>
    <hr>

    <div class="text-center mt-3">
      <p>Selected Seats: {{ selectedSeats.length ? selectedSeats.join(', ') : 'None' }}</p>
      <h4>Total: ₹{{ total }}</h4>
    </div>

    <button class="btn btn-danger w-100 mt-3" (click)="confirmBooking()">
      Confirm Booking
    </button>

    <p class="text-danger mt-3 text-center">{{ error }}</p>

  </div>
</div>
